<!DOCTYPE html> <!-- Tells the browser this is a modern HTML5 document -->
<html lang="en"> <!-- Root element; lang="en" tells screen readers it's English -->
<head> <!-- Invisible setup section — nothing here is shown to the user -->
  <meta charset="UTF-8" /> <!-- Allows emoji, $, special characters to display correctly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes layout fit mobile screens properly -->
  <title>Rishabh's Budget Tracker</title> <!-- Text shown on the browser tab -->

  <!-- Chart.js loaded from CDN — gives us the donut chart without writing it from scratch -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style> <!-- Everything between these tags is CSS — controls how things look -->

    *, *::before, *::after { /* Star * means: apply this to EVERY element on the page */
      box-sizing: border-box; /* Width/height includes padding — prevents elements overflowing */
      margin: 0;  /* Removes default outer spacing browsers add automatically */
      padding: 0; /* Removes default inner spacing browsers add automatically */
    }

    :root { /* CSS variables — define colours once here, reuse them everywhere below */
      --bg:       #0a0f1e; /* Darkest background — the page itself */
      --surface:  #111827; /* Card background colour */
      --surface2: #1a2234; /* Slightly lighter — used for inputs and transaction rows */
      --border:   #1f2d45; /* Subtle border colour around cards */
      --text:     #e2e8f0; /* Main text colour — light grey */
      --muted:    #64748b; /* Secondary label text — darker grey */
      --blue:     #3b82f6; /* Primary accent — buttons, highlights */
      --green:    #22c55e; /* Income colour */
      --red:      #ef4444; /* Expense / danger colour */
      --amber:    #f59e0b; /* Warning colour — budget nearly full */
      --purple:   #8b5cf6; /* Savings rate colour */
    }

    body { /* Base styles applied to the entire page */
      font-family: 'Segoe UI', system-ui, sans-serif; /* Font — falls back to system font if unavailable */
      background: var(--bg); /* Uses the --bg variable defined in :root above */
      color: var(--text);    /* Default text colour for all elements */
      min-height: 100vh;     /* Page is at least as tall as the screen */
      padding: 1.5rem 1rem;  /* Breathing space around the edges */
    }

    .container { /* Wrapper that limits content width and centres it on wide screens */
      max-width: 960px; /* Never wider than 960px */
      margin: 0 auto;   /* auto left+right margin centres it horizontally */
    }

    /* ── HEADER ─────────────────────────────────────── */
    .header { /* Row containing title on left and month nav on right */
      display: flex;
      justify-content: space-between; /* Pushes title left, month nav right */
      align-items: flex-start;
      margin-bottom: 1.75rem;
      flex-wrap: wrap; /* Wraps to next line on small screens */
      gap: 1rem;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; color: var(--blue); }
    .header p  { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }

    .month-nav { /* The left/right arrow month switcher pill */
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 0.875rem;
    }
    .month-nav button { /* The < and > arrow buttons */
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer; /* Shows hand cursor on hover */
      width: auto;
      padding: 0;
      line-height: 1;
    }
    .month-nav button:hover { color: var(--text); } /* Brightens arrow on hover */
    .month-nav span { /* The "March 2026" text in the middle */
      font-weight: 600;
      font-size: 0.95rem;
      min-width: 120px;   /* Fixed width prevents layout jumping between months */
      text-align: center;
    }

    /* ── TOP STAT CARDS ─────────────────────────────── */
    .stats-grid { /* Container for the 4 summary cards */
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 equal columns side by side */
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { /* On small screens, switch to 2 columns */
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card { /* Each individual summary card */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .stat-card .s-label { /* Small uppercase label e.g. "NET BALANCE" */
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .stat-card .s-value { /* The big number inside each stat card */
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card .s-sub { /* Small text below the number e.g. "3 transactions" */
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    /* Colour utility classes — applied to elements to set text colour */
    .c-blue   { color: var(--blue); }
    .c-green  { color: var(--green); }
    .c-red    { color: var(--red); }
    .c-amber  { color: var(--amber); }
    .c-purple { color: var(--purple); }

    /* ── MAIN TWO-COLUMN LAYOUT ─────────────────────── */
    .main-grid { /* Left column (form + list) and right column (chart + budgets) */
      display: grid;
      grid-template-columns: 1fr 320px; /* Left takes remaining space, right fixed 320px */
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 800px) { /* Stack into single column on small screens */
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ── CARD COMPONENT ─────────────────────────────── */
    .card { /* Reusable card style used throughout the page */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .card-title { /* Small uppercase section heading inside each card */
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 1.1rem;
      font-weight: 600;
    }

    /* ── ADD TRANSACTION FORM ───────────────────────── */
    .form-row { /* A row containing two side-by-side inputs */
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); /* Two equal columns that can shrink */
      gap: 0.65rem;
      margin-bottom: 0.65rem;
      min-width: 0;
    }
    .form-row.full { grid-template-columns: 1fr; overflow: hidden; } /* Override: single full-width column */

    input, select { /* Styles all input boxes and dropdowns */
      width: 100%;
      min-width: 0;
      padding: 0.6rem 0.875rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2); /* Slightly lighter than card */
      color: var(--text);
      font-size: 0.875rem;
      outline: none; /* Removes default blue browser outline on focus */
      transition: border-color .2s; /* Smooth animation when border changes */
    }
    input:focus, select:focus { border-color: var(--blue); } /* Blue border when clicked into */
    input::placeholder { color: var(--muted); } /* Placeholder text is muted grey */
    select option { background: var(--surface2); } /* Dropdown options match dark theme */

    .add-btn { /* The main "+ Add Transaction" button */
      width: 100%;
      padding: 0.7rem;
      background: var(--blue);
      color: #fff;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .2s;
      margin-top: 0.25rem;
    }
    .add-btn:hover { background: #2563eb; } /* Darker blue on hover */

    /* ── BUDGET PROGRESS BARS ───────────────────────── */
    .budget-item { margin-bottom: 1rem; } /* Each category budget row */
    .budget-item:last-child { margin-bottom: 0; } /* No extra space after last item */
    .budget-row { /* Label and SGD amounts on the same line */
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
    }
    .budget-name { font-size: 0.82rem; display: flex; align-items: center; gap: 0.4rem; }
    .budget-amounts { font-size: 0.75rem; color: var(--muted); }
    .budget-amounts span { font-weight: 600; }

    .progress-bar { /* The grey track behind the coloured fill */
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden; /* Clips fill so it doesn't go outside the track */
    }
    .progress-fill { /* The coloured fill — width set dynamically by JavaScript */
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease; /* Smooth animation when value changes */
    }
    .fill-green { background: var(--green); } /* Under 70% of budget used */
    .fill-amber { background: var(--amber); } /* 70–89% of budget used */
    .fill-red   { background: var(--red);   } /* 90%+ of budget used */

    /* ── CHART ──────────────────────────────────────── */
    .chart-wrap { /* Container that gives the canvas a fixed height */
      position: relative;
      height: 200px;
    }

    /* ── TRANSACTION LIST ───────────────────────────── */
    .tx-header { /* Row with title, Export and Clear buttons */
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .tx-header .card-title { margin-bottom: 0; } /* Remove bottom margin when inside header row */

    .clear-btn { /* "Clear Month" — outlined red button */
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .clear-btn:hover { background: var(--red); color: #fff; } /* Fills red on hover */

    .tx-filters { /* Row of All / Income / Expenses filter pill buttons */
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-btn { /* Each individual filter pill button */
      padding: 0.3rem 0.875rem;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 20px; /* Pill shape */
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      width: auto; /* Shrinks to fit text — overrides global button width:100% */
    }
    .filter-btn.active { /* Currently selected filter highlighted in blue */
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .tx-list { /* Scrollable container holding all transaction rows */
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 420px; /* Fixed height — scrolls when many transactions exist */
      overflow-y: auto;
    }
    .tx-list::-webkit-scrollbar { width: 4px; } /* Thin scrollbar */
    .tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tx-row { /* Each individual transaction row card */
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
      animation: slideIn .18s ease; /* Entrance animation plays when row appears */
    }
    @keyframes slideIn { /* The slide-in animation definition */
      from { opacity: 0; transform: translateY(-6px); } /* Starts invisible, 6px above */
      to   { opacity: 1; transform: translateY(0); }    /* Fades into normal position */
    }

    .tx-icon { /* The emoji icon square on the left of each row */
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0; /* Prevents icon shrinking if description text is long */
    }
    .tx-icon.income  { background: #052e16; } /* Dark green background for income */
    .tx-icon.expense { background: #2d0a0a; } /* Dark red background for expense */

    .tx-info { /* Middle section: description and category/date metadata */
      flex: 1;       /* Takes all remaining horizontal space */
      min-width: 0;  /* Required for text-overflow: ellipsis to work */
    }
    .tx-desc { /* The description text e.g. "Grab to work" */
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;      /* Prevents text wrapping to next line */
      overflow: hidden;         /* Hides text that doesn't fit */
      text-overflow: ellipsis;  /* Adds "..." when text is too long */
    }
    .tx-meta { /* Smaller grey text: category name and date */
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .tx-right { /* Right side of each row: amount and delete button */
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0; /* Prevents right side from shrinking */
    }
    .tx-amount { font-size: 0.95rem; font-weight: 700; }
    .tx-amount.income  { color: var(--green); } /* Green for income amounts */
    .tx-amount.expense { color: var(--red);   } /* Red for expense amounts */

    .del-btn { /* The small X delete button on each row */
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      width: auto;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      transition: color .15s;
    }
    .del-btn:hover { color: var(--red); } /* Turns red on hover */

    .empty { /* Shown when no transactions match the current filter */
      text-align: center;
      color: var(--muted);
      padding: 2.5rem 0;
      font-size: 0.875rem;
    }

    /* ── SAVINGS RATE BADGE ──────────────────────────── */
    .savings-badge { /* Small coloured pill shown below the savings % */
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      margin-top: 0.4rem;
    }
    .savings-good { background: #052e16; color: var(--green); } /* >= 20% savings */
    .savings-ok   { background: #3b2200; color: var(--amber); } /* 1–19% savings */
    .savings-bad  { background: #2d0a0a; color: var(--red);   } /* 0% or negative */

    /* ── EXPORT BUTTON ───────────────────────────────── */
    .export-btn { /* "Export CSV" — outlined blue button */
      font-size: 0.78rem;
      padding: 0.35rem 0.875rem;
      background: transparent;
      color: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
      width: auto;
    }
    .export-btn:hover { background: var(--blue); color: #fff; }

  </style>
</head>
<body>
<div class="container"> <!-- Centres all content, max 960px wide -->

  <!-- HEADER: Title on left, month navigator on right -->
  <div class="header">
    <div>
      <h1>💼 Rishabh's Budget Tracker</h1>
      <p>Personal finance dashboard · Singapore</p>
    </div>
    <!-- Clicking arrows calls changeMonth(-1) or changeMonth(1) in JavaScript -->
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button> <!-- ‹ left arrow -->
      <span id="month-label"></span> <!-- JavaScript writes "March 2026" here -->
      <button onclick="changeMonth(1)">&#8250;</button>  <!-- › right arrow -->
    </div>
  </div>

  <!-- TOP STAT CARDS: Balance, Income, Expenses, Savings Rate -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="s-label">Net Balance</div>
      <div class="s-value c-blue" id="stat-balance">SGD 0</div> <!-- JS updates this -->
      <div class="s-sub" id="stat-balance-sub">This month</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Income</div>
      <div class="s-value c-green" id="stat-income">SGD 0</div>
      <div class="s-sub" id="stat-income-sub">0 transactions</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Expenses</div>
      <div class="s-value c-red" id="stat-expense">SGD 0</div>
      <div class="s-sub" id="stat-expense-sub">0 transactions</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Savings Rate</div>
      <div class="s-value c-purple" id="stat-rate">0%</div>
      <div id="stat-rate-badge"></div> <!-- JS injects the coloured badge here -->
    </div>
  </div>

  <!-- MAIN TWO-COLUMN GRID -->
  <div class="main-grid">

    <!-- LEFT COLUMN: Form + Transaction list -->
    <div style="display:flex;flex-direction:column;gap:1.25rem;">

      <!-- ADD TRANSACTION FORM -->
      <div class="card">
        <div class="card-title">Add Transaction</div>

        <!-- Full-width description field -->
        <div class="form-row full">
          <input type="text" id="desc" placeholder="Description (e.g. Grab to work, Netflix, Salary)" />
        </div>

        <!-- Amount and type (Income/Expense) side by side -->
        <div class="form-row">
          <input type="number" id="amount" placeholder="Amount (SGD)" step="0.01" min="0" />
          <!-- onchange swaps the category dropdown when user switches between income/expense -->
          <select id="type" onchange="updateCategoryOptions()">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <!-- Category and date side by side -->
        <div class="form-row">
          <select id="category"></select> <!-- Options filled by JavaScript on load -->
          <input type="date" id="date" />
        </div>

        <!-- Clicking this calls addTransaction() in JavaScript -->
        <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>
      </div>

      <!-- TRANSACTION LIST -->
      <div class="card">
        <div class="tx-header">
          <div class="card-title">Transactions</div>
          <div style="display:flex;gap:0.5rem;">
            <button class="export-btn" onclick="exportCSV()">&#11015; Export CSV</button>
            <button class="clear-btn" onclick="clearMonth()">Clear Month</button>
          </div>
        </div>

        <!-- Filter pills — clicking one calls setFilter() -->
        <div class="tx-filters">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
          <button class="filter-btn" onclick="setFilter('expense', this)">Expenses</button>
        </div>

        <!-- JavaScript fills this div with transaction rows -->
        <div class="tx-list" id="tx-list"></div>
      </div>

    </div>

    <!-- RIGHT COLUMN: Donut chart + Budget progress bars -->
    <div style="display:flex;flex-direction:column;gap:1.25rem;">

      <!-- SPENDING BREAKDOWN DONUT CHART -->
      <div class="card">
        <div class="card-title">Spending Breakdown</div>
        <div class="chart-wrap">
          <canvas id="pie-chart"></canvas> <!-- Chart.js draws here -->
        </div>
        <div id="chart-legend" style="margin-top:0.875rem;display:flex;flex-direction:column;gap:0.35rem;"></div>
        <!-- JavaScript injects the custom legend here -->
      </div>

      <!-- MONTHLY BUDGET LIMITS WITH PROGRESS BARS -->
      <div class="card">
        <div class="card-title">Monthly Budgets</div>
        <div id="budget-list"></div> <!-- JavaScript fills this with progress bar rows -->
      </div>

    </div>
  </div>

</div> <!-- end .container -->

<script>

/* ── DATA AND STATE ──────────────────────────────────────────── */

/* Load saved transactions from localStorage, or start with empty array */
/* JSON.parse converts the saved text string back into a JavaScript array */
let transactions = JSON.parse(localStorage.getItem('bgt-transactions') || '[]');

/* Monthly budget limits per category in SGD */
/* Edit these numbers to change your personal budget limits */
let budgets = JSON.parse(localStorage.getItem('bgt-budgets') || JSON.stringify({
  '🧋 Bubble Tea':       50,   /* Max SGD 50 on bubble tea per month */
  '🚗 Grab / Transport': 150,  /* Max SGD 150 on transport per month */
  '🍜 Food & Dining':    400,  /* Max SGD 400 on food per month */
  '📚 Education':        200,
  '🎮 Entertainment':    100,
  '🏠 Housing / Rent':   1200,
  '🛒 Shopping':         200,
  '💊 Health':           100,
  '🧳 Travel':           300,
  '📦 Other':            150,
}));

/* viewDate tracks which month the user is currently viewing */
let viewDate = new Date(); /* Starts as today */

/* txFilter controls which transactions show: 'all', 'income', or 'expense' */
let txFilter = 'all';

/* Category lists — swapped in the dropdown based on income vs expense */
const EXPENSE_CATS = [
  '🧋 Bubble Tea', '🚗 Grab / Transport', '🍜 Food & Dining',
  '📚 Education',  '🎮 Entertainment',    '🏠 Housing / Rent',
  '🛒 Shopping',   '💊 Health',           '🧳 Travel', '📦 Other'
];
const INCOME_CATS = [
  '💼 Salary / Allowance', '💰 Freelance', '🎁 Bonus',
  '📈 Investment Returns',  '📦 Other Income'
];

/* Colours for each slice of the donut chart */
const CHART_COLORS = [
  '#3b82f6','#22c55e','#f59e0b','#ef4444',
  '#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#64748b'
];

/* pieChart stores a reference to the Chart.js object */
/* We need this so we can destroy and recreate it when data changes */
let pieChart = null;

/* ── INITIALISATION ──────────────────────────────────────────── */

/* Set the date input to today when the page loads */
document.getElementById('date').valueAsDate = new Date();

/* Fill the category dropdown with expense categories (default type is expense) */
updateCategoryOptions();

/* Write the current month name into the header */
updateMonthLabel();

/* Draw the full UI for the first time */
render();

/* ── MONTH NAVIGATION ────────────────────────────────────────── */

/* changeMonth() runs when < or > arrows are clicked */
/* dir = -1 for previous month, +1 for next month */
function changeMonth(dir) {
  /* Create a new Date set to the 1st of the target month */
  viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1);
  updateMonthLabel(); /* Update header text */
  render();           /* Redraw everything for the new month */
}

/* updateMonthLabel() writes the month + year into the header span */
function updateMonthLabel() {
  document.getElementById('month-label').textContent =
    viewDate.toLocaleDateString('en-SG', { month: 'long', year: 'numeric' });
}

/* getMonthTx() filters transactions to only those in the viewed month */
function getMonthTx() {
  return transactions.filter(t => {
    const d = new Date(t.date + 'T00:00:00'); /* Parse date string safely */
    /* Keep only transactions where year AND month match the viewed month */
    return d.getFullYear() === viewDate.getFullYear() &&
           d.getMonth()    === viewDate.getMonth();
  });
}

/* ── CATEGORY DROPDOWN ───────────────────────────────────────── */

/* updateCategoryOptions() swaps the category list when type changes */
function updateCategoryOptions() {
  const type = document.getElementById('type').value; /* 'income' or 'expense' */
  const sel  = document.getElementById('category');
  const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  /* Build <option> tags for each category and inject into the select element */
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

/* ── FILTER ──────────────────────────────────────────────────── */

/* setFilter() runs when All / Income / Expenses filter buttons are clicked */
/* f = filter string ('all','income','expense'), btn = the clicked button element */
function setFilter(f, btn) {
  txFilter = f; /* Update global filter state */
  /* Remove 'active' class from all filter buttons */
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); /* Add 'active' class to the clicked button */
  render(); /* Redraw transaction list with the new filter */
}

/* ── ADD TRANSACTION ─────────────────────────────────────────── */

/* addTransaction() runs when the user clicks the Add button */
function addTransaction() {
  /* Read all form values using their HTML id attributes */
  const desc     = document.getElementById('desc').value.trim();        /* trim() removes extra spaces */
  const amount   = parseFloat(document.getElementById('amount').value); /* Convert text to decimal number */
  const type     = document.getElementById('type').value;               /* 'income' or 'expense' */
  const category = document.getElementById('category').value;           /* Selected category string */
  const date     = document.getElementById('date').value;               /* Date string e.g. "2026-03-31" */

  /* Validate — stop with an alert if anything is wrong */
  if (!desc)                  { alert('Please enter a description.'); return; }
  if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
  if (!date)                  { alert('Please select a date.'); return; }

  /* Push a new transaction object onto the array */
  transactions.push({
    id: Date.now().toString(), /* Unique ID — current timestamp as string, always different */
    desc, amount, type, category, date /* ES6 shorthand: desc is short for desc: desc */
  });

  save(); /* Save to localStorage and redraw */

  /* Clear form inputs so user can add another transaction */
  document.getElementById('desc').value   = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').valueAsDate = new Date(); /* Reset to today */
}

/* ── DELETE TRANSACTION ──────────────────────────────────────── */

/* deleteTransaction() runs when user clicks the X on a transaction row */
function deleteTransaction(id) {
  /* .filter() creates a NEW array keeping only items where id does NOT match */
  /* This is the immutable update pattern — never modify the original array directly */
  transactions = transactions.filter(t => t.id !== id);
  save();
}

/* ── CLEAR MONTH ─────────────────────────────────────────────── */

/* clearMonth() removes all transactions for the currently viewed month */
function clearMonth() {
  const label = viewDate.toLocaleDateString('en-SG', { month: 'long', year: 'numeric' });
  if (!confirm(`Clear all transactions for ${label}?`)) return; /* Ask to confirm first */

  const monthTx = getMonthTx();
  const ids = new Set(monthTx.map(t => t.id)); /* Set = fast lookup — like a hash set */
  transactions = transactions.filter(t => !ids.has(t.id)); /* Keep everything NOT in this month */
  save();
}

/* ── EXPORT CSV ──────────────────────────────────────────────── */

/* exportCSV() downloads the current month's data as a .csv file */
/* The user can open this in Excel or Google Sheets */
function exportCSV() {
  const monthTx = getMonthTx();
  if (monthTx.length === 0) { alert('No transactions to export this month.'); return; }

  /* Build CSV string — first row is the header */
  const header = 'Date,Description,Category,Type,Amount (SGD)';
  const rows   = monthTx.map(t =>
    `${t.date},"${t.desc}","${t.category}",${t.type},${t.amount.toFixed(2)}`
  );
  const csv = [header, ...rows].join('\n'); /* Join all rows with newline characters */

  /* Create a downloadable Blob (file) from the CSV string */
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob); /* Create a temporary download URL */

  /* Programmatically click a hidden link to trigger the file download */
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `budget-${viewDate.getFullYear()}-${viewDate.getMonth()+1}.csv`;
  a.click();
  URL.revokeObjectURL(url); /* Clean up temporary URL after download starts */
}

/* ── SAVE + RENDER ───────────────────────────────────────────── */

/* save() writes data to localStorage then triggers a full re-render */
function save() {
  localStorage.setItem('bgt-transactions', JSON.stringify(transactions)); /* Array → text string */
  render();
}

/* ── MAIN RENDER FUNCTION ────────────────────────────────────── */

/* render() rebuilds the entire UI whenever data changes */
/* Same mental model as React: state changes → re-render */
function render() {
  const monthTx = getMonthTx(); /* Only transactions for the viewed month */

  /* Calculate totals */
  let income = 0, expense = 0;
  monthTx.forEach(t => {
    if (t.type === 'income') income += t.amount;
    else expense += t.amount;
  });
  const balance = income - expense;

  /* Savings rate = % of income that was saved (avoid dividing by zero) */
  const savingsRate = income > 0 ? Math.round(((income - expense) / income) * 100) : 0;

  /* Update Net Balance card */
  const balEl = document.getElementById('stat-balance');
  balEl.textContent = (balance < 0 ? '−' : '') + fmtCurrency(balance); /* Add minus sign if negative */
  balEl.className   = 's-value ' + (balance >= 0 ? 'c-blue' : 'c-red'); /* Blue if positive, red if negative */

  /* Update Income and Expense stat cards */
  document.getElementById('stat-income').textContent  = fmtCurrency(income);
  document.getElementById('stat-expense').textContent = fmtCurrency(expense);
  document.getElementById('stat-rate').textContent    = savingsRate + '%';

  /* Count income and expense transactions for the sub-labels */
  const incomeTx  = monthTx.filter(t => t.type === 'income');
  const expenseTx = monthTx.filter(t => t.type === 'expense');
  document.getElementById('stat-income-sub').textContent  =
    incomeTx.length  + ' transaction' + (incomeTx.length  !== 1 ? 's' : ''); /* Pluralise */
  document.getElementById('stat-expense-sub').textContent =
    expenseTx.length + ' transaction' + (expenseTx.length !== 1 ? 's' : '');

  /* Build and inject the savings health badge */
  let badgeClass = 'savings-bad',  badgeText = '⚠ Spending more than earning';
  if (savingsRate >= 20) { badgeClass = 'savings-good'; badgeText = '✓ Healthy savings rate'; }
  else if (savingsRate > 0) { badgeClass = 'savings-ok'; badgeText = '~ Try to save more'; }
  document.getElementById('stat-rate-badge').innerHTML =
    `<span class="savings-badge ${badgeClass}">${badgeText}</span>`;

  /* Delegate remaining rendering to specialised functions */
  renderTransactions(monthTx); /* Rebuild the scrollable transaction list */
  renderChart(expenseTx);      /* Rebuild the donut chart */
  renderBudgets(expenseTx);    /* Rebuild the budget progress bars */
}

/* ── RENDER TRANSACTIONS ─────────────────────────────────────── */

/* renderTransactions() rebuilds the scrollable list of transaction rows */
function renderTransactions(monthTx) {
  const list = document.getElementById('tx-list');

  /* Apply the active filter */
  let filtered = txFilter === 'all' ? monthTx
    : monthTx.filter(t => t.type === txFilter);

  /* Spread [...] to copy the array before reversing — never mutate the original */
  filtered = [...filtered].reverse(); /* Newest transactions at the top */

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">No transactions found.<br>Add one above!</div>`;
    return; /* Exit early — nothing else to render */
  }

  /* .map() converts each transaction object into an HTML string */
  /* .join('') merges all strings into one big HTML block with no separator */
  list.innerHTML = filtered.map(t => `
    <div class="tx-row">
      <!-- Split category by space, take first part which is the emoji -->
      <div class="tx-icon ${t.type}">${t.category.split(' ')[0]}</div>
      <div class="tx-info">
        <div class="tx-desc">${escHtml(t.desc)}</div>
        <!-- indexOf finds position of first space, slice removes the emoji -->
        <div class="tx-meta">${t.category.slice(t.category.indexOf(' ')+1)} · ${fmtDate(t.date)}</div>
      </div>
      <div class="tx-right">
        <span class="tx-amount ${t.type}">
          ${t.type === 'income' ? '+' : '−'}${fmtCurrency(t.amount)}
        </span>
        <!-- Pass this transaction's unique ID to deleteTransaction() on click -->
        <button class="del-btn" onclick="deleteTransaction('${t.id}')" title="Delete">&#x2715;</button>
      </div>
    </div>
  `).join('');
}

/* ── RENDER DONUT CHART ──────────────────────────────────────── */

/* renderChart() draws the spending breakdown donut chart using Chart.js */
function renderChart(expenseTx) {
  /* Group expenses by category name, summing amounts */
  const catTotals = {};
  expenseTx.forEach(t => {
    const name = t.category.slice(t.category.indexOf(' ')+1); /* Category without emoji */
    catTotals[name] = (catTotals[name] || 0) + t.amount;      /* Add to total or start at 0 */
  });

  const labels = Object.keys(catTotals);   /* Array of category names */
  const data   = Object.values(catTotals); /* Array of matching amounts */

  /* Destroy old chart before creating a new one */
  /* Required by Chart.js — drawing on a canvas that already has a chart throws an error */
  if (pieChart) { pieChart.destroy(); pieChart = null; }

  const canvas = document.getElementById('pie-chart');
  const legend = document.getElementById('chart-legend');

  if (labels.length === 0) {
    canvas.style.display = 'none';
    legend.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:0.82rem;padding:1rem 0;">No expenses this month</div>`;
    return;
  }

  canvas.style.display = 'block';

  /* Create a new Chart.js doughnut chart */
  pieChart = new Chart(canvas, {
    type: 'doughnut', /* Doughnut = pie with a hole in the middle */
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: CHART_COLORS.slice(0, labels.length), /* One colour per slice */
        borderWidth: 2,
        borderColor: '#111827', /* Gap colour between slices — matches card background */
      }]
    },
    options: {
      responsive: true,           /* Resizes with its container */
      maintainAspectRatio: false, /* Uses our fixed 200px height */
      cutout: '65%',              /* Size of centre hole — 65% makes a thin ring */
      plugins: {
        legend: { display: false }, /* Hide default legend — we draw a custom one */
        tooltip: {
          callbacks: {
            /* Custom tooltip showing SGD amount and percentage */
            label: ctx => ` SGD ${ctx.parsed.toFixed(2)} (${Math.round(ctx.parsed / data.reduce((a,b)=>a+b,0) * 100)}%)`
          }
        }
      }
    }
  });

  /* Build custom legend below the chart */
  const total = data.reduce((a,b) => a+b, 0); /* Sum all expenses for % calculation */
  legend.innerHTML = labels.map((l, i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.78rem;">
      <div style="display:flex;align-items:center;gap:0.4rem;">
        <!-- Coloured dot matching the chart slice colour -->
        <span style="width:9px;height:9px;border-radius:50%;background:${CHART_COLORS[i]};display:inline-block;flex-shrink:0;"></span>
        <span style="color:var(--muted);">${l}</span>
      </div>
      <span style="font-weight:600;">${Math.round(data[i]/total*100)}%</span>
    </div>
  `).join('');
}

/* ── RENDER BUDGET PROGRESS BARS ─────────────────────────────── */

/* renderBudgets() builds the progress bar row for each expense category */
function renderBudgets(expenseTx) {
  /* Sum how much was spent per category this month */
  const spent = {};
  expenseTx.forEach(t => {
    spent[t.category] = (spent[t.category] || 0) + t.amount;
  });

  const container = document.getElementById('budget-list');

  container.innerHTML = EXPENSE_CATS.map(cat => {
    const limit = budgets[cat] || 0; /* Monthly budget limit for this category */
    const used  = spent[cat]  || 0; /* Amount spent — 0 if nothing spent yet */

    /* Percentage of budget used — capped at 100 so bar doesn't overflow */
    const pct = Math.min(Math.round((used / limit) * 100), 100);

    /* Choose fill colour based on how full the budget is */
    const fillCls = pct >= 90 ? 'fill-red' : pct >= 70 ? 'fill-amber' : 'fill-green';

    const emoji = cat.split(' ')[0];             /* Just the emoji character */
    const name  = cat.slice(cat.indexOf(' ')+1); /* Just the category name text */

    return `
      <div class="budget-item">
        <div class="budget-row">
          <div class="budget-name">${emoji} <span style="color:var(--text);">${name}</span></div>
          <div class="budget-amounts">
            <!-- Amount spent coloured red/amber/green by how close to limit -->
            <span style="color:${pct>=90?'var(--red)':pct>=70?'var(--amber)':'var(--green)'}">SGD ${used.toFixed(0)}</span>
            <span style="color:var(--muted);"> / ${limit}</span>
          </div>
        </div>
        <!-- progress-fill width is set as a CSS percentage — JS calculates pct -->
        <div class="progress-bar">
          <div class="progress-fill ${fillCls}" style="width:${pct}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

/* ── HELPER FUNCTIONS ────────────────────────────────────────── */

/* fmtCurrency() turns a number like 1234.5 into "SGD 1,234.50" */
function fmtCurrency(n) {
  return 'SGD ' + Math.abs(n)   /* Math.abs removes minus sign — we add it manually */
    .toFixed(2)                 /* Always 2 decimal places e.g. 5 becomes 5.00 */
    .replace(/\B(?=(\d{3})+(?!\d))/g, ','); /* Regex inserts commas every 3 digits */
}

/* fmtDate() turns "2026-03-31" into "31 Mar 2026" */
function fmtDate(dateStr) {
  if (!dateStr) return ''; /* Return empty string if date is missing */
  const d = new Date(dateStr + 'T00:00:00'); /* T00:00:00 prevents timezone shift bugs */
  return d.toLocaleDateString('en-SG', {     /* Singapore locale date format */
    day: 'numeric', month: 'short', year: 'numeric'
  });
}

/* escHtml() prevents XSS injection via the description field */
/* If someone types a script tag, this makes it safe text */
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')  /* & becomes &amp; */
    .replace(/</g, '&lt;')   /* < becomes &lt; — prevents opening HTML tags */
    .replace(/>/g, '&gt;');  /* > becomes &gt; — prevents closing HTML tags */
}

</script>
